name: Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUST_TEST_THREADS: 1

permissions:
  contents: read

concurrency:
  group: integration-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nnx-real-model-nightly:
    name: NNX Real-Model - ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: TinyLlama Q2_K smoke
            cache_key: nnx-real-model-nightly-tinyllama-q2k-v1
            model_path: .github/models/tinyllama-1.1b-chat-v1.0.Q2_K.gguf
            model_url: https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q2_K.gguf
          - name: TinyLlama Q4_K_M fuller
            cache_key: nnx-real-model-nightly-tinyllama-q4km-v1
            model_path: .github/models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf
            model_url: https://huggingface.co/TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF/resolve/main/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Cache GGUF model
        id: cache-model
        uses: actions/cache@v4
        with:
          path: ${{ matrix.model_path }}
          key: ${{ matrix.cache_key }}

      - name: Download GGUF model
        if: steps.cache-model.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p "$(dirname \"${{ matrix.model_path }}\")"
          curl -L --fail --retry 3 --retry-all-errors \
            "${{ matrix.model_url }}" \
            -o "${{ matrix.model_path }}"

      - name: Run NNX real-model integration harness
        env:
          NNX_TEST_MODEL: ${{ matrix.model_path }}
        run: cargo test -p nnx-transformer --test integration -- --nocapture

      - name: Upload integration logs on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: nnx-real-model-${{ matrix.name }}
          path: target/debug/deps/
